version: "3.9"

services:
  fastapi:
    build: .
    container_name: ai-rag-fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./data.db:/app/data.db
    restart: unless-stopped

  react:
    build: ./ai-rag-chat-ui
    container_name: ai-rag-ui
    ports:
      - "3000:80"
    depends_on:
      - fastapi
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: ai-rag-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
    restart: unless-stopped

volumes:
  n8n_data:
